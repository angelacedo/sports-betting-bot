services:
  db:
    image: postgres:15-alpine
    container_name: sportsbot_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sportsbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - botnet

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sportsbot_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot_secret}@db:5432/${POSTGRES_DB:-sportsbot}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - botnet

networks:
  botnet:
    driver: bridge

volumes:
  postgres_data:
